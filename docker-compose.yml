version: '3.3'

services:
  web:
    build: ./site
    command: python3 manage.py runserver 0.0.0.0:8000
    volumes:
      - ./site/:/usr/src/site/
    ports:
      - 8000:8000
    env_file:
      - ./.env.dev
  db:
    image: postgres:13.0-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=VnJn0vaAJRDR1mV
      - POSTGRES_DB=site_dev

volumes:
  postgres_data: